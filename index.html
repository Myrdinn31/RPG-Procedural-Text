  	let acheteurs = ["Chantal", "Christian", "Manou", "Mathieu", "Monique", "Sonia", "Vincent", "Benjamin", "Laëtitia"];
    let receveurs = ["Chantal", "Christian", "Manou", "Mathieu", "Monique", "Sonia", "Vincent", "Benjamin", "Laëtitia"];
    let resultat = [];
    let resultatTemp;
    let tirageAcheteurs = 0;
    let tirageReceveurs = 0;
  
    for (let i = 0 ; i < 9 ; i++) {
      resultatTemp = {
        "acheteur": "", 
        "receveur": ""
      };
      
      tirageAcheteurs =  Math.floor(Math.random() * acheteurs.length);
      resultatTemp.acheteur = acheteurs[tirageAcheteurs];
  
      do {
        tirageReceveurs =  Math.floor(Math.random() * receveurs.length);
      } while (receveurs[tirageReceveurs] === acheteurs[tirageAcheteurs]);
  
      resultatTemp.receveur = receveurs[tirageReceveurs];
  
      acheteurs.splice(tirageAcheteurs, 1);
      receveurs.splice(tirageReceveurs, 1);
  
      resultat.push(resultatTemp);
    }
  
  resultat.forEach(cadeau => document.getElementById("display-array").innerHTML += "<br>" + Object.values(cadeau).join(" offre un cadeau à "));
  </script>
