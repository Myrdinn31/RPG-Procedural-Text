<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Projet Simple</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Bienvenue dans mon projet simple</h1>
            <p>Un projet basique avec HTML, CSS et JavaScript</p>
        </header>
        
        <main>
            <section class="counter-section">
                <h2>Compteur interactif</h2>
                <div class="counter-display">
                    <button id="decrement">-</button>
                    <span id="counter">0</span>
                    <button id="increment">+</button>
                </div>
            </section>
            
            <section class="info-section">
                <div class="card">
                    <h3>✨ Simple</h3>
                    <p>Pas de frameworks complexes, juste du code vanille</p>
                </div>
                <div class="card">
                    <h3>⚡ Rapide</h3>
                    <p>Chargement instantané et réactif</p>
                </div>
                <div class="card">
                    <h3>🎯 Direct</h3>
                    <p>Facile à comprendre et à modifier</p>
                </div>
            </section>
        </main>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
